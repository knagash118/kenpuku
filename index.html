<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ドリンク・スロット</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script src="./slot.js"></script>
    <link rel="icon" href="./favicon.png" type="image/x-icon">
    <style>
        /* 全体の背景：空のような明るい水色から薄い黄色へのグラデーション */
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Arial Black', sans-serif;
            /* background: linear-gradient(135deg, #fff9c4, #b3e5fc); */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
        }

        /* コンテナ：角丸で、おもちゃ箱のような温かい雰囲気 */
        .container {
            background: #ffffff;
            padding: 25px;
            padding-bottom: 100px;
            border-radius: 35px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: 100%;
            max-width: 500px;
            border: 6px solid #ffeb3b;
            /* 明るい黄色の縁取り */
        }

        /* スマホ向けの調整 */
        @media screen and (max-width: 600px) {
            body {
                padding: 5px;
                /* 全体の余白を小さく */
            }

            .container {
                max-width: 100%;
                /* 最大幅を制限しない */
                width: 95vw;
                /* 画面幅の95%を使う */
                /* 高さ一杯にする設定 */
                min-height: calc(100vh - 50px);
                /* 上下の余白(padding)分を引く */
                box-sizing: border-box;
                padding: 15px;
                /* 内側の余白を少し詰める */
                border-radius: 20px;
                /* 角丸を少し小さく */
                border-width: 4px;
                /* 枠線を少し細く */
            }

            .container>div:nth-child(3)>div:last-child {
                font-size: 28px !important;
                /* スマホで1行に収まるサイズに調整 */
                letter-spacing: 2px !important;
                /* 文字間隔も少し詰めるとより収まりやすくなります */
            }
        }

        h1 {
            color: #f57c00;
            font-size: 32px;
            margin: 5px 0;
            text-shadow: 1px 1px #fff;
        }

        /* スロット窓：ワクワクするオレンジベース */
        #slot-display {
            background: #fff3e0;
            color: #e65100;
            font-size: 30px;
            font-weight: bold;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 6px solid #ffb74d;
            border-radius: 25px;
            margin: 20px 0;
            box-shadow: inset 0 4px 0 rgba(255, 255, 255, 0.5);
            margin-top: 50px;
            /*　上にさらに余裕を作る */
        }

        /* 楽しいボタン：クリックしたくなる立体感 */
        .btn {
            cursor: pointer;
            border: none;
            font-weight: bold;
            border-radius: 50px;
            padding: 20px;
            width: 100%;
            font-size: 24px;
            color: white;
            box-shadow: 0 8px #d84315;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: translateY(4px);
            /*押されている風*/
        }

        .btn:disabled {
            background-color: #bdbdbd !important;
            /* グレー */
            box-shadow: 0 8px #757575 !important;
            /* 影も暗く */
            cursor: not-allowed;
            /* 禁止マークのカーソル */
            transform: none;
            /* 押し込みアニメーションを無効化 */
        }

        #main-btn {
            /* background-color: #ff9800; */
            margin-top: 20px;
            /* ボタンの上にさらに余裕を作る */
        }

        #main-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px #d84315;
        }

        /* カテゴリー別のストップ配色 */
        /* 濃いめのピンク（マゼンタ寄り） */
        .stop-jelly {
            background-color: #bd0c53 !important;
            box-shadow: 0 8px #880e4f !important;
        }

        /* 濃いめのブルー（ネイビー寄り） */
        .stop-drink {
            background-color: #0f4583 !important;
            box-shadow: 0 8px #051e42 !important;
        }

        /* ランダム（デフォルト） */
        .stop-random {
            background-color: #d32f2f !important;
            box-shadow: 0 8px #b71c1c !important;
        }

        /* .stop-style {
            background-color: #f44336 !important;
            box-shadow: 0 8px #b71c1c !important;
        } */

        #hit-btn {
            background-color: #FF69B4;
        }

        #hit-btn:active {
            transform: translateY(8px);
            /* 押し込みを深く */
            box-shadow: 0 2px #C2185B;
        }

        /* 大当たり用オーバーレイのスタイル */
        #overlay {
            display: none;
            /* 初期状態は非表示 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;

            background-size: cover;
            /* 画像を画面全体にフィットさせる */
            background-position: center;
            /* 画像を中央に配置 */
            color: white;
            font-size: 10vw;
            /* 画面幅に応じたサイズ */
            font-weight: bold;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
        }

        .overlay-ooatari {
            background-image: url('./1064898.jpg') !important;
        }

        .overlay-omake {
            background-image: none !important;
            background: rgba(0, 0, 0, 0.9) !important;
            /* グレー */
        }

        /* ローディング画面 */
        #loading {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            z-index: 9999;

            justify-content: center;
            align-items: center;
        }

        /* クルクル */
        .spinner {
            width: 70px;
            height: 70px;
            border: 8px solid #E3F2FD;
            border-top: 8px solid #2196F3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #slider-knob:active {
            transform: scale(0.9);
            /* 押すと少し小さくなる[cite: 1] */
            background-color: #388E3C !important;
            /* 押すと色が少し暗くなる[cite: 1] */
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
            /* 押し込まれたような影[cite: 1] */
        }
    </style>
</head>
<div id="loading">
    <div class="spinner"></div>
</div>

<body>
    <div class="container">
        <img src="./emblem.jpg" width="50%" height="50%">
        <br />
        <div style="text-align:center; margin-bottom:20px;">
            <div style="
        color:#666;
        font-size:18px;
        letter-spacing:8px;
        font-weight:bold;">
                横浜南陵高校
            </div>
            <div style="
        width:240px;
        height:3px;
        background:linear-gradient(to right,#29b6f6,#ff9800,#ff4081);
        margin:10px auto 15px;
        border-radius:3px;">
            </div>
            <div style="
        font-size:42px;
        font-weight:900;
        letter-spacing:4px;
        background:linear-gradient(90deg,#ff4081,#ff9800,#29b6f6);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        text-shadow:2px 2px 8px rgba(0,0,0,0.2);">
                健康福祉グループ
            </div>
        </div>

        <h1 id="slot-title">ドリンク・スロット</h1>
        <div id="overlay">
            <div style="text-align: center;">
                <p id="overlay-message"
                    style="font-size: 24px; margin-bottom: 20px; color: #fff; text-shadow: 2px 2px 4px #000;">
                    お店の人に見せてね
                </p>
                <button id="hit-btn" class="btn" onclick="closeButton()"></button>
            </div>
        </div>

        <div id="slot-display">READY?</div>
        <button id="main-btn" class="btn" onclick="toggleSlot()">スタート！</button>
</body>
<!-- 選択画面用オーバーレイ -->
<div id="select-overlay"
    style="display: flex; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; gap: 20px;">
    <h2 style="color:white;">どれにする？</h2>
    <button class="btn" style="width: 200px; background: #f385db;box-shadow: 0 8px #686767;"
        onclick="selectCategory('jelly')">ゼリー</button>
    <button class="btn" style="width: 200px; background: #2196F3;box-shadow: 0 8px #686767;"
        onclick="selectCategory('drink')">ペットボトル</button>
    <button class="btn" style="width: 200px; background: #FF9800;box-shadow: 0 8px #686767;"
        onclick="selectCategory('all')">ランダム</button>
</div>
<div id="ticket-overlay"
    style="display: flex; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; gap: 20px;">
    <h2 style="color:white;">チケットを渡してね</h2>
    <div id="slider-track"
        style="width: 250px; height: 60px; background: #333; border-radius: 30px; position: relative; overflow: hidden; border: 2px solid #fff;">
        <div id="slider-knob"
            style="width: 60px; height: 60px; background: #4CAF50; border-radius: 50%; position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">
            ≫</div>
        <span
            style="position: absolute; width: 100%; text-align: center; line-height: 60px; color: #888; pointer-events: none;" />
    </div>
</div>

</html>
